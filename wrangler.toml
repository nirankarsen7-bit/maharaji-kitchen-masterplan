name = "maharaji-kitchen"
main = ".output/server/index.mjs"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Production environment
[env.production]
name = "maharaji-kitchen"

# Staging / non-production branch environment
[env.staging]
name = "maharaji-kitchen-staging"

# Preview / dev branch environment
[env.preview]
name = "maharaji-kitchen-preview"

# KV binding example (agar chahiye toh)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# R2 binding example (agar file storage chahiye toh)
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "maharaji-assets"
